<div class="toolbar">
  <h1>Novo cliente</h1>
  <a routerLink="/clientes" class="link-back">← Voltar à lista</a>
</div>

@if (erro) {
  <p class="alert" role="alert">{{ erro }}</p>
}

<form [formGroup]="form" (ngSubmit)="salvar()" class="form">
  <label>
    <span>Nome exibido</span>
    <input type="text" formControlName="nome" required autocomplete="name" />
  </label>

  <label>
    <span>Telefone</span>
    <input type="tel" formControlName="telefone" autocomplete="tel" />
  </label>

  <label>
    <span>Observações (opcional)</span>
    <textarea formControlName="notas" rows="3"></textarea>
  </label>

  <button type="submit" class="btn primary" [disabled]="salvando">
    {{ salvando ? 'Salvando…' : 'Salvar cliente' }}
  </button>
</form>
