<div class="arpc">
  <span class="arpc__label">Além deste, repetir mais</span>
  <div class="arpc__field">
    <button
      type="button"
      class="arpc__trigger"
      [disabled]="disabled"
      [attr.aria-expanded]="aberto"
      (click)="toggle($event)"
    >
      <span
        class="arpc__trigger-text"
        [class.arpc__trigger-text--placeholder]="value.modo === 'nenhum'"
        >{{ rotuloTrigger }}</span
      >
      <span class="arpc__chev" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 9l6 6 6-6"
          />
        </svg>
      </span>
    </button>

    <div
      class="arpc__panel-elev"
      [class.arpc__panel-elev--open]="aberto"
      [attr.aria-hidden]="!aberto"
    >
      <div
        class="arpc__panel-inner"
        [class.arpc__panel-inner--duas-colunas]="fase === 'repeticoes' && freqAlvo"
        role="listbox"
        aria-label="Repetir agendamento"
      >
        <div class="arpc__col arpc__col--freq">
          @for (f of itensFrequencia; track f) {
            <button
              type="button"
              class="arpc__row"
              [class.arpc__row--active]="fase === 'repeticoes' && freqAlvo === f"
              (click)="onClicFrequencia(f, $event)"
            >
              <div class="arpc__row-texts">
                <span class="arpc__row-title">{{ rotuloFrequencia[f] }}</span>
                <span class="arpc__row-desc">{{ descricaoFrequencia(f) }}</span>
              </div>
              @if (fase === 'frequencia') {
                <span class="arpc__row-chev" aria-hidden="true">›</span>
              }
            </button>
          }
          <button
            type="button"
            class="arpc__row arpc__row--muted"
            (click)="limpar($event)"
          >
            <span class="arpc__row-texts arpc__row-texts--so-titulo">
              <span class="arpc__row-title">Não repetir</span>
            </span>
          </button>
        </div>
        @if (fase === 'repeticoes' && freqAlvo) {
          <div class="arpc__col arpc__col--vezes" aria-label="Número de repetições">
            <div class="arpc__vezes-tit">Repetições (além deste)</div>
            <div class="arpc__vezes-scroll">
              @for (n of vezesOpcoes; track n) {
                <button
                  type="button"
                  class="arpc__vezes-item"
                  (click)="escolherVezes(n, $event)"
                >
                  {{ n === 1 ? '1 vez' : n + ' vezes' }}
                </button>
              }
            </div>
          </div>
        }
      </div>
    </div>
  </div>
  @if (disabled) {
    <p class="arpc__hint">Indisponível ao editar um agendamento existente.</p>
  }
</div>
