<div class="ahs" (click)="$event.stopPropagation()">
  <button
    type="button"
    class="ahs__trigger"
    (click)="toggle($event)"
    [disabled]="isDisabled"
    [attr.aria-label]="ariaFieldLabel || 'Horário inicial'"
    [attr.aria-expanded]="panelOpen"
    aria-haspopup="listbox"
  >
    <span
      class="ahs__value"
      [class.ahs__value--ph]="!displayLabel"
    >{{ displayLabel || "08:00" }}</span>
    <span class="ahs__chevron" aria-hidden="true">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M6 9l6 6 6-6" />
      </svg>
    </span>
  </button>
  <div
    class="ahs__panel-elev"
    [class.ahs__panel-elev--open]="panelOpen"
    [attr.aria-hidden]="!panelOpen"
  >
    <div class="ahs__panel" role="listbox">
      <ul class="ahs__list">
        @for (o of opcoes; track o.hhmm) {
          <li>
            <button
              type="button"
              class="ahs__opt"
              [class.ahs__opt--busy]="o.indisponivel"
              role="option"
              [tabindex]="panelOpen ? 0 : -1"
              (click)="escolher(o.hhmm, o.indisponivel, $event)"
            >
              <span class="ahs__t">{{ o.hhmm }}</span>
              @if (o.indisponivel) {
                <span class="ahs__busy">(Indisponível)</span>
              }
            </button>
          </li>
        }
      </ul>
    </div>
  </div>
</div>
