<div
  class="saas-select"
  [class.saas-select--open]="panelOpen"
  [class.saas-select--disabled]="isDisabled"
>
  <button
    type="button"
    class="saas-select__trigger"
    [disabled]="isDisabled"
    [attr.aria-expanded]="panelOpen"
    [attr.aria-haspopup]="'listbox'"
    (click)="togglePanel($event)"
  >
    <span
      class="saas-select__value"
      [class.saas-select__value--placeholder]="!displayLabel"
    >
      {{ displayLabel || placeholder }}
    </span>
    <span class="saas-select__icons" aria-hidden="true">
      @if (panelOpen) {
        <svg
          class="saas-select__icon"
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="7" />
          <path stroke-linecap="round" d="M21 21l-4.35-4.35" />
        </svg>
      } @else {
        <svg
          class="saas-select__icon"
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6" />
        </svg>
      }
    </span>
  </button>

  <div
    class="saas-select__panel-elev"
    [class.saas-select__panel-elev--open]="panelOpen"
    [attr.aria-hidden]="!panelOpen"
  >
    <div class="saas-select__panel" role="listbox">
      @if (showFilter) {
        <div class="saas-select__filter">
          <input
            type="search"
            class="saas-select__filter-input"
            [value]="filterText"
            (input)="onFilterInput($event)"
            (click)="$event.stopPropagation()"
            [tabindex]="panelOpen ? 0 : -1"
            placeholder="Pesquisar…"
            autocomplete="off"
          />
        </div>
      }
      <div
        class="saas-select__list"
        [class.saas-select__list--com-criar]="showCriarCliente"
        role="presentation"
      >
        @for (opt of filteredOptions; track opt.value) {
          <button
            type="button"
            class="saas-select__option"
            role="option"
            [class.saas-select__option--active]="opt.value === selectedValue"
            [tabindex]="panelOpen ? 0 : -1"
            (click)="choose(opt, $event)"
          >
            {{ opt.label }}
          </button>
        }
        @if (filteredOptions.length === 0) {
          <div class="saas-select__empty">Sem resultados</div>
        }
      </div>
      @if (showCriarCliente) {
        <div class="saas-select__criar-wrap">
          <button
            type="button"
            class="saas-select__criar"
            [tabindex]="panelOpen ? 0 : -1"
            (click)="onCriarClienteClick($event)"
          >
            <svg
              class="saas-select__criar-ico"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
            Criar cliente
          </button>
        </div>
      }
    </div>
  </div>
</div>
