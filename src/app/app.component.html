<div class="shell">
  <header class="top">
    <a routerLink="/" class="brand">{{ title }}</a>
    <nav class="nav" aria-label="Principal">
      <a
        routerLink="/agenda"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        >Agenda</a
      >
      <a
        routerLink="/financeiro"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Financeiro</a
      >
      <a routerLink="/financeiro/comissoes" routerLinkActive="active"
        >Comissões</a
      >
      <a routerLink="/clientes" routerLinkActive="active">Clientes</a>
      <a routerLink="/servicos" routerLinkActive="active">Serviços</a>
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Início</a
      >
    </nav>
  </header>
  <main class="main">
    <router-outlet />
  </main>
</div>
