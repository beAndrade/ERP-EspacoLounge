<div class="shell">
  <header class="top">
    <a
      routerLink="/"
      class="brand"
      [attr.aria-label]="'Ir para o início — ' + title"
      >{{ title }}</a
    >
    <nav class="nav nav--main" aria-label="Principal">
      <a
        routerLink="/agenda"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <path d="M16 2v4M8 2v4M3 10h18" />
        </svg>
        <span class="nav-item__label">Agenda</span>
      </a>
      <a
        routerLink="/financeiro"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="9" />
          <path
            d="M16 8h-6a2 2 0 0 0 0 4h4a2 2 0 0 1 0 4H8M12 6v2M12 16v2"
          />
        </svg>
        <span class="nav-item__label">Financeiro</span>
      </a>
      <a routerLink="/estoque" routerLinkActive="active" class="nav-item">
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="3.5" y="9" width="17" height="11" rx="2" ry="2" />
          <path d="M8.5 9V7a3.5 3.5 0 0 1 7 0v2" />
        </svg>
        <span class="nav-item__label">Estoque</span>
      </a>
      <a routerLink="/clientes" routerLinkActive="active" class="nav-item">
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1" />
        </svg>
        <span class="nav-item__label">Clientes</span>
      </a>
      <a routerLink="/promocoes" routerLinkActive="active" class="nav-item">
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
          />
          <circle cx="7" cy="7" r="1.25" fill="currentColor" stroke="none" />
        </svg>
        <span class="nav-item__label">Promoções</span>
      </a>
      <a routerLink="/relatorios" routerLinkActive="active" class="nav-item">
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21.21 15.89A10 10 0 1 1 8 3.07" />
          <path d="M22 12A10 10 0 0 0 12 2v10z" />
        </svg>
        <span class="nav-item__label">Relatórios</span>
      </a>
      <a routerLink="/consultoria" routerLinkActive="active" class="nav-item">
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
          />
        </svg>
        <span class="nav-item__label">Consultoria</span>
      </a>
      <a routerLink="/profissionais" routerLinkActive="active" class="nav-item">
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="4" y="3" width="16" height="18" rx="2" />
          <circle cx="12" cy="10" r="2.5" />
          <path d="M8 17c.8-1.5 2.2-2.5 4-2.5s3.2 1 4 2.5" />
        </svg>
        <span class="nav-item__label">Profissionais</span>
      </a>
      <a routerLink="/configuracoes" routerLinkActive="active" class="nav-item">
        <svg
          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M12 9V3.5M12 15v5.5M9 12H3.5M15 12h5.5M9.88 9.88l-4.1-4.1M14.12 14.12l4.1 4.1M9.88 14.12l-4.1 4.1M14.12 9.88l4.1-4.1"
          />
        </svg>
        <span class="nav-item__label">Configurações</span>
      </a>
    </nav>
  </header>
  <main class="main">
    <router-outlet />
  </main>
</div>
