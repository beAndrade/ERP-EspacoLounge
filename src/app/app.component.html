<div class="shell">

          class="nav-item__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"

          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
